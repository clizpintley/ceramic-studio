# Legacy Netlify CMS config kept for reference only.
# Active CMS is the custom in-app editor at /cms.
backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "catalog"
    label: "Catalog"
    files:
      - name: "products"
        label: "Products"
        file: "data/products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.title}} ({{fields.category}})"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Unique id, e.g. ceramic-friends-mug" }
              - { label: "Slug", name: "slug", widget: "string", hint: "Used in URL, e.g. friends-mug" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Drinkware", value: "drinkware" }
                  - { label: "Tableware", value: "tableware" }
                  - { label: "Decor", value: "decor" }
                  - { label: "Tote Bags", value: "tote-bags" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Short Description", name: "short", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "number", value_type: "float", min: 0 }
              - { label: "Image", name: "image", widget: "image" }
